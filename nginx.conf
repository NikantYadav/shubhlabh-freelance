server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/x-javascript image/svg+xml font/woff2 application/font-woff2;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|svg|png|jpe?g|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
